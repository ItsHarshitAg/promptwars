steps:
  # Build the Docker image with public client-side config as build args
  # GEMINI_API_KEY and FIREBASE_SERVICE_ACCOUNT are NOT baked in — runtime-only secrets
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/smartstadium'
      - '--build-arg'
      - 'VITE_FIREBASE_API_KEY=$_VITE_FIREBASE_API_KEY'
      - '--build-arg'
      - 'VITE_FIREBASE_AUTH_DOMAIN=$_VITE_FIREBASE_AUTH_DOMAIN'
      - '--build-arg'
      - 'VITE_FIREBASE_DATABASE_URL=$_VITE_FIREBASE_DATABASE_URL'
      - '--build-arg'
      - 'VITE_FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID'
      - '--build-arg'
      - 'VITE_FIREBASE_STORAGE_BUCKET=$_VITE_FIREBASE_STORAGE_BUCKET'
      - '--build-arg'
      - 'VITE_FIREBASE_MESSAGING_SENDER_ID=$_VITE_FIREBASE_MESSAGING_SENDER_ID'
      - '--build-arg'
      - 'VITE_FIREBASE_APP_ID=$_VITE_FIREBASE_APP_ID'
      - '--build-arg'
      - 'VITE_FIREBASE_MEASUREMENT_ID=$_VITE_FIREBASE_MEASUREMENT_ID'
      - '--build-arg'
      - 'VITE_GOOGLE_MAPS_KEY=$_VITE_GOOGLE_MAPS_KEY'
      - '.'

  # Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/smartstadium']

  # Deploy to Cloud Run
  # GEMINI_API_KEY and FIREBASE_SERVICE_ACCOUNT are injected from Secret Manager at runtime
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'smartstadium'
      - '--image=gcr.io/$PROJECT_ID/smartstadium'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--set-env-vars'
      - >-
        VITE_FIREBASE_API_KEY=$_VITE_FIREBASE_API_KEY,
        VITE_FIREBASE_AUTH_DOMAIN=$_VITE_FIREBASE_AUTH_DOMAIN,
        VITE_FIREBASE_DATABASE_URL=$_VITE_FIREBASE_DATABASE_URL,
        VITE_FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID,
        VITE_FIREBASE_STORAGE_BUCKET=$_VITE_FIREBASE_STORAGE_BUCKET,
        VITE_FIREBASE_MESSAGING_SENDER_ID=$_VITE_FIREBASE_MESSAGING_SENDER_ID,
        VITE_FIREBASE_APP_ID=$_VITE_FIREBASE_APP_ID,
        VITE_FIREBASE_MEASUREMENT_ID=$_VITE_FIREBASE_MEASUREMENT_ID,
        VITE_GOOGLE_MAPS_KEY=$_VITE_GOOGLE_MAPS_KEY
      - '--set-secrets'
      - 'GEMINI_API_KEY=gemini-api-key:latest,FIREBASE_SERVICE_ACCOUNT=firebase-service-account:latest'

images:
  - 'gcr.io/$PROJECT_ID/smartstadium'

options:
  substitutionOption: ALLOW_LOOSE

substitutions:
  _VITE_FIREBASE_API_KEY: ''
  _VITE_FIREBASE_AUTH_DOMAIN: ''
  _VITE_FIREBASE_DATABASE_URL: ''
  _VITE_FIREBASE_PROJECT_ID: ''
  _VITE_FIREBASE_STORAGE_BUCKET: ''
  _VITE_FIREBASE_MESSAGING_SENDER_ID: ''
  _VITE_FIREBASE_APP_ID: ''
  _VITE_FIREBASE_MEASUREMENT_ID: ''
  _VITE_GOOGLE_MAPS_KEY: ''
  _GEMINI_API_KEY: ''
